steps:
  - key: "trigger-test"
    label: "🎯 Trigger Test"
    trigger: "trigger02"
    retry:
      automatic:
        - exit_status: "*"
          limit: 2

  - key: "race-check"
    label: "🏃 Dependency Check"
    command: |
      echo "✅ Dependency cleared!"
      echo "⏰ Time: $(date)"
    depends_on:
      - "trigger-test"
    agents:
      queue: "default"
