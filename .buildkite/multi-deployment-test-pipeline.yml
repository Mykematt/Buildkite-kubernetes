# Demo: Installing AWS CLI at runtime without modifying base image
# This addresses the customer question about plugin dependencies

steps:
  - label: "🔧 Demo: Working Init Container Example"
    command: |
      echo "--- 🏗️ Verifying AWS CLI is available"
      if command -v aws >/dev/null 2>&1; then
        echo "✅ AWS CLI found!"
        aws --version
        
        echo "--- 🧪 Testing AWS CLI functionality"
        aws help | head -5
        
        echo "--- ✅ Success: Custom image + runtime dependencies working!"
      else
        echo "❌ AWS CLI not found"
        echo "Checking what's in shared volume:"
        ls -la /usr/local/bin/ || echo "No /usr/local/bin"
        echo "Current PATH: $PATH"
      fi
      
      echo "--- 📦 Container info"
      echo "Base image: alpine:latest (Customer would use their custom image here)"
      echo "Dependencies: Installed via init container"
    agents:
      queue: "kubernetes"
    plugins:
      - kubernetes:
          podSpec:
            # Simplified init container that should work
            initContainers:
              - name: install-aws-cli
                image: alpine:latest
                command: ["/bin/sh"]
                args:
                  - -c
                  - |
                    echo "Installing AWS CLI..."
                    apk update
                    apk add --no-cache python3 py3-pip
                    pip3 install awscli
                    mkdir -p /shared/bin
                    cp /usr/bin/aws /shared/bin/
                    echo "AWS CLI installed successfully"
                    ls -la /shared/bin/
                volumeMounts:
                  - name: shared-tools
                    mountPath: /shared
            
            containers:
              - name: container-0
                image: alpine:latest
                volumeMounts:
                  - name: shared-tools
                    mountPath: /usr/local
                env:
                  - name: PATH
                    value: "/usr/local/bin:/usr/bin:/bin:/usr/local/bin"
            
            volumes:
              - name: shared-tools
                emptyDir: {}

  - label: "🔄 Demo: Alternative Working Approach"
    command: |
      echo "--- 📦 Comparison: Using AWS CLI image directly"
      echo "This works but customer wants to avoid modifying their base image"
      
      aws --version
      echo "✅ This approach works immediately"
      
      echo "--- 💡 Why customer needs init container approach:"
      echo "• They have existing custom base image with their tools"
      echo "• Don't want to rebuild/maintain modified images"
      echo "• Want to add dependencies at runtime"
    agents:
      queue: "kubernetes"
    plugins:
      - kubernetes:
          podSpecPatch:
            containers:
              - name: container-0
                image: amazon/aws-cli:latest

  - label: "📝 Customer Solution Summary"
    command: |
      echo "--- 🎯 Solving Customer's Requirements"
      echo ""
      echo "Customer Question:"
      echo "\"How to install plugin dependencies (AWS CLI) without baking into image?\""
      echo ""
      echo "✅ SOLUTION: Init Container Pattern"
      echo "• Init container: Install dependencies to shared volume"
      echo "• Main container: Use customer's base image + mount shared volume"
      echo "• Result: Dependencies available without image modification"
      echo ""
      echo "🔧 Implementation Notes:"
      echo "• Replace alpine:latest with customer's actual base image"
      echo "• Customize init container for their specific dependencies"
      echo "• Works with any plugins (cache, deploy, etc.)"
      echo "• Kubernetes-native approach"
      echo ""
      echo "📊 This addresses their constraints:"
      echo "• ✅ No image modification"
      echo "• ✅ Runtime dependency installation" 
      echo "• ✅ Plugin execution order independent"
      echo "• ✅ Works with vendored plugins"
    agents:
      queue: "kubernetes"