# Demo: Installing AWS CLI at runtime without modifying base image
# This addresses the customer question about plugin dependencies

steps:
  - label: "🔧 Demo: Init Container + Custom Image"
    command: |
      echo "--- 🏗️ Verifying AWS CLI is available"
      which aws
      aws --version
      
      echo "--- 📦 This container uses a custom image but has AWS CLI from init container"
      echo "Base image: alpine:latest (lightweight, no AWS CLI built-in)"
      echo "AWS CLI: installed by init container into shared volume"
      
      echo "--- 🧪 Testing AWS CLI functionality"
      # This would normally interact with AWS services
      # For demo purposes, just show it's working
      aws help | head -10
      
      echo "--- ✅ Success: Custom image + runtime dependencies"
    agents:
      queue: "kubernetes"
    plugins:
      - kubernetes:
          podSpec:
            # Init container installs AWS CLI into shared volume
            initContainers:
              - name: install-aws-cli
                image: amazonlinux:latest
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    echo "🚀 Installing AWS CLI in init container..."
                    
                    # Install AWS CLI v2
                    yum update -y
                    yum install -y curl unzip
                    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
                    unzip awscliv2.zip
                    
                    # Install to shared volume location
                    ./aws/install --install-dir /shared/aws-cli --bin-dir /shared/bin
                    
                    echo "✅ AWS CLI installed to shared volume"
                    ls -la /shared/bin/
                volumeMounts:
                  - name: shared-tools
                    mountPath: /shared
            
            # Main container uses custom image + shared tools
            containers:
              - name: container-0
                image: alpine:latest  # Customer's custom image would go here
                volumeMounts:
                  - name: shared-tools
                    mountPath: /usr/local
                env:
                  - name: PATH
                    value: "/usr/local/bin:/usr/bin:/bin"
            
            # Shared volume for tools
            volumes:
              - name: shared-tools
                emptyDir: {}

  - label: "🔄 Demo: Cache Plugin with AWS CLI"
    command: |
      echo "--- 📦 Demonstrating cache plugin scenario"
      echo "This step shows how plugins can use AWS CLI installed by init container"
      
      echo "AWS CLI version for cache plugin:"
      aws --version
      
      echo "--- 🗂️ Simulating cache plugin behavior"
      # This is what a cache plugin would do:
      # 1. Check if cache exists in S3
      # 2. Download if exists, or upload after build
      echo "Cache plugin would use: aws s3 cp s3://my-cache-bucket/cache.tar.gz ."
      echo "✅ Cache plugin can successfully use AWS CLI"
    agents:
      queue: "kubernetes"
    plugins:
      - kubernetes:
          podSpec:
            initContainers:
              - name: install-aws-cli
                image: amazonlinux:latest
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    yum update -y && yum install -y curl unzip
                    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
                    unzip awscliv2.zip
                    ./aws/install --install-dir /shared/aws-cli --bin-dir /shared/bin
                volumeMounts:
                  - name: shared-tools
                    mountPath: /shared
            containers:
              - name: container-0
                image: alpine:latest  # Customer's build image
                volumeMounts:
                  - name: shared-tools
                    mountPath: /usr/local
                env:
                  - name: PATH
                    value: "/usr/local/bin:/usr/bin:/bin"
            volumes:
              - name: shared-tools
                emptyDir: {}

  - wait: ~

  - label: "🆚 Comparison: Different Approaches"
    command: |
      echo "--- 📊 Customer's Options Summary"
      echo ""
      echo "❌ REJECTED: Modify base image"
      echo "   • Customer doesn't want to 'bake deps into the image'"
      echo "   • Would require rebuilding/maintaining custom images"
      echo ""
      echo "❌ ALTERNATIVE: Use AWS CLI image per step"
      echo "   • Would work: podSpecPatch with amazon/aws-cli:latest"
      echo "   • Problem: Customer likely has custom base image they want to keep"
      echo ""
      echo "✅ RECOMMENDED: Init container approach"
      echo "   • Keep existing custom base image"
      echo "   • Install dependencies at runtime via init container"
      echo "   • Share tools via volume mount"
      echo "   • Works across multiple steps if needed"
      echo ""
      echo "🎯 This solves the customer's specific constraints:"
      echo "   • No image modification required"
      echo "   • Dependencies available for plugins"
      echo "   • Works with vendored/non-vendored plugin execution order"
      echo "   • Kubernetes-native approach"
    agents:
      queue: "kubernetes"

  - label: "📝 Implementation Notes"
    command: |
      echo "--- 🛠️ For Customer Implementation"
      echo ""
      echo "Key points to customize:"
      echo ""
      echo "1. Replace 'alpine:latest' with their actual base image"
      echo "   containers:"
      echo "     - name: container-0"
      echo "       image: mycompany/build-image:latest"
      echo ""
      echo "2. Customize the init container installation"
      echo "   - Add any other tools they need"
      echo "   - Optimize for their package manager"
      echo "   - Consider caching strategies"
      echo ""
      echo "3. Volume mount paths"
      echo "   - Adjust /usr/local mount point if conflicts"
      echo "   - Update PATH environment variable accordingly"
      echo ""
      echo "4. Plugin compatibility"
      echo "   - Cache plugin will find AWS CLI in PATH"
      echo "   - Works regardless of vendored plugin execution order"
      echo "   - Dependencies available in job container context"
      echo ""
      echo "✅ This approach addresses their core question:"
      echo "   'How to install plugin dependencies without baking into image'"
    agents:
      queue: "kubernetes"
